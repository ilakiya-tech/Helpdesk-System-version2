<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Field Staff Ticket Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1F3373;
            --secondary-color: #2b479e;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .dashboard {
            max-width: 1400px;
            margin: 20px auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .ticket-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .ticket-filters select,
        .ticket-filters input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            flex-grow: 1;
        }

        .ticket-table {
            width: 100%;
            background-color: var(--white);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .ticket-table th {
            background-color: var(--background-light);
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
            padding: 1rem;
            text-align: left;
        }

        .ticket-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .ticket-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open { 
            background-color: #e6f2ff; 
            color: #1e3a8a; 
        }
        .status-in-progress { 
            background-color: #dbeafe; 
            color: #1d4ed8; 
        }
        .status-resolved { 
            background-color: #ddf4e4; 
            color: #166534; 
        }

        .view-details-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .view-details-btn:hover {
            background-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 1rem;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .ticket-filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <div class="flex-grow-1 main-content">
        <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark d-none">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" fill="var(--primary-color)" />
                        <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                    </svg>
                    Staff Dashboard
                </a>
            </div>
        </nav>
        
        <div class="dashboard">
            <div class="dashboard-header">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" fill="var(--primary-color)" />
                        <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                    </svg>
                    <span class="company-name">Carbochem</span>
                </div>
                <h1>Field Staff Ticket Dashboard</h1>
            </div>

            <div id="availability-section" style="display:none">
                <div class="card mb-3" id="availability">
                    <div class="card-body py-3">
                        <h5 class="mb-3">Update Availability & Leave Status</h5>
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <strong>My Status:</strong>
                            <select class="form-select form-select-sm" style="max-width:180px" id="avail-select">
                                <option value="available">Available</option>
                                <option value="on_leave">On Leave</option>
                                <option value="busy">Busy</option>
                            </select>
                            <span id="avail-status" class="badge bg-success">Available</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tickets-section">
                <h4 class="mb-3">Assigned Tickets</h4>
                <div class="ticket-filters mb-3" id="tickets">
                    <select id="status-filter" class="form-select"><option value="">All Statuses</option><option value="open">Open</option><option value="in-progress">In Progress</option><option value="resolved">Resolved</option></select>
                    <input type="text" id="search-input" class="form-control" placeholder="Search tickets...">
                </div>

                <div class="table-responsive">
                    <table class="ticket-table" id="ticket-table">
                        <thead>
                            <tr>
                                <th>Ticket ID</th>
                                <th>Title</th>
                                <th>Customer</th>
                                <th>Created Date</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ticket-list">
                            <!-- Tickets will be dynamically populated from API -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('token') || localStorage.getItem('userRole') !== 'staff') {
            window.location.href = 'index.html';
        }

        // Inject Sidebar
        Sidebar.inject('staff', 'staff.html');

        function switchTab() {
            const hash = window.location.hash;
            const availSec = document.getElementById('availability-section');
            const tickSec = document.getElementById('tickets-section');
            
            if (hash === '#availability') {
                if (availSec) availSec.style.display = 'block';
                if (tickSec) tickSec.style.display = 'none';
            } else {
                if (availSec) availSec.style.display = 'none';
                if (tickSec) tickSec.style.display = 'block';
            }
        }
        window.addEventListener('hashchange', switchTab);
        window.addEventListener('load', switchTab);

        let allTickets = [];

        async function loadAvailability() {
            const r = await API.getStaffList();
            const me = (r.staff || []).find(s => s.username === localStorage.getItem('username'));
            if (me) {
                document.getElementById('avail-select').value = me.availability || 'available';
                updateAvailBadge(me.availability);
            }
        }

        function updateAvailBadge(a) {
            const el = document.getElementById('avail-status');
            const map = { available: ['Available','bg-success'], on_leave: ['On Leave','bg-warning text-dark'], busy: ['Busy','bg-danger'] };
            const [t,c] = map[a] || map.available;
            el.textContent = t; el.className = 'badge ' + c;
        }

        document.getElementById('avail-select').addEventListener('change', async e => {
            const uid = localStorage.getItem('userId');
            if (uid) {
                await API.updateStaffAvailability(uid, e.target.value);
                updateAvailBadge(e.target.value);
            }
        });

        // Load assigned tickets for this staff member
        async function loadTickets() {
            try {
                const ticketList = document.getElementById('ticket-list');
                ticketList.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <div class="spinner-container">
                                <div class="loading-spinner"></div>
                            </div>
                        </td>
                    </tr>`;
                const result = await API.getAssigned();
                if (result.success) {
                    allTickets = result.tickets || [];
                    if (allTickets.length === 0) {
                        ticketList.innerHTML = `
                            <tr>
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="empty-state">
                                        <span class="empty-state-icon">🎫</span>
                                        <h5>No Tickets Assigned</h5>
                                        <p>You currently do not have any tickets assigned to you.</p>
                                    </div>
                                </td>
                            </tr>`;
                    } else {
                        renderTickets(allTickets);
                    }
                } else {
                    ticketList.innerHTML = `<tr><td colspan="7" class="text-danger text-center py-4">Failed to load tickets: ${result.message || 'Unknown error'}</td></tr>`;
                }
            } catch (error) {
                console.error('Failed to load tickets:', error);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function renderTickets(filteredTickets = allTickets) {
            const ticketList = document.getElementById('ticket-list');
            ticketList.innerHTML = '';
            
            if (filteredTickets.length === 0) {
                ticketList.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No tickets assigned to you</td></tr>';
                return;
            }

            filteredTickets.forEach(ticket => {
                const statusClass = ticket.status.toLowerCase().replace(' ', '-');
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td>${ticket.title}</td>
                    <td>${ticket.customerName || 'N/A'}</td>
                    <td>${formatDate(ticket.createdAt)}</td>
                    <td>
                        <span class="ticket-status status-${statusClass}">
                            ${ticket.status}
                        </span>
                    </td>
                    <td>${ticket.priority}</td>
                    <td>
                        <button class="view-details-btn" onclick="viewTicketDetails('${ticket.id}')">View Details</button>
                    </td>
                `;
                ticketList.appendChild(row);
            });
        }

        // Filter by status
        document.getElementById('status-filter').addEventListener('change', (e) => {
            const status = e.target.value;
            const filteredTickets = status 
                ? allTickets.filter(t => t.status.toLowerCase().replace(' ', '-') === status)
                : allTickets;
            renderTickets(filteredTickets);
        });

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredTickets = allTickets.filter(t => 
                t.title.toLowerCase().includes(searchTerm) ||
                t.id.toString().includes(searchTerm) ||
                (t.customerName && t.customerName.toLowerCase().includes(searchTerm))
            );
            renderTickets(filteredTickets);
        });

        function viewTicketDetails(ticketId) {
            window.location.href = `ticket-details.html?id=${ticketId}`;
        }

        // logout() provided by auth.js

        // Initial load
        loadAvailability();
        loadTickets();
    </script>
</body>
</html>
