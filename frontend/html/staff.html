<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Field Staff Ticket Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1F3373;
            --secondary-color: #2b479e;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .dashboard {
            max-width: 1400px;
            margin: 20px auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .ticket-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .ticket-filters select,
        .ticket-filters input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            flex-grow: 1;
        }

        .ticket-table {
            width: 100%;
            background-color: var(--white);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid #e2e8f0;
        }

        .ticket-table th {
            background-color: var(--background-light);
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
            padding: 1rem;
            text-align: left;
            border-bottom: 1.5px solid #cbd5e1;
        }

        .ticket-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .view-details-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 550;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .view-details-btn:hover {
            background-color: var(--secondary-color);
        }

        .staff-status-card {
            background-color: var(--white);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: justify;
            gap: 2rem;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .layout-row { flex-direction: column !important; }
            .dashboard { padding: 1rem; }
            .staff-status-card { flex-direction: column; align-items: stretch; gap: 1rem; }
            .ticket-filters { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <div class="flex-grow-1 main-content p-4">
        
        <div class="dashboard">
            <!-- Dashboard Header -->
            <div class="dashboard-header">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" fill="var(--primary-color)" />
                        <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                    </svg>
                    <span class="company-name">Carbochem</span>
                </div>
            </div>

            <!-- Staff Status Card -->
            <div class="staff-status-card">
                <div>
                    <h5 class="mb-1 text-primary fw-bold" id="staff-name-display">Loading...</h5>
                    <p class="text-muted mb-0 small">Update your status to manage incoming ticket assignments</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-semibold small text-secondary">My Availability:</span>
                    <span id="avail-badge-container"></span>
                    <select class="form-select form-select-sm ms-2" id="avail-select" style="width: auto;">
                        <option value="available">Available</option>
                        <option value="on_leave">On Leave</option>
                        <option value="busy">Busy</option>
                    </select>
                </div>
            </div>

            <h4 class="mb-3 text-primary fw-bold">My Assigned Tickets</h4>
            
            <!-- Filters -->
            <div class="ticket-filters">
                <input type="text" class="form-control" id="search-input" placeholder="Search by Ticket ID, title or customer...">
                <select class="form-select" id="status-filter" style="max-width:200px">
                    <option value="">All Statuses</option>
                    <option value="assigned">Assigned</option>
                    <option value="in-progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>

            <!-- Tickets Table -->
            <div class="table-responsive">
                <table class="ticket-table table-hover">
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Title</th>
                            <th>Customer Name</th>
                            <th>Date Assigned</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="ticket-list">
                        <!-- Loaded via API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!requireAuth(['staff'])) throw new Error('auth');

        // Inject Sidebar
        Sidebar.inject('staff', 'staff.html');

        let allTickets = [];

        async function loadAvailability() {
            const uid = localStorage.getItem('userId');
            if (uid) {
                const r = await API.getStaffList();
                const list = r.staff || [];
                const cur = list.find(s => String(s.userId) === String(uid));
                if (cur) {
                    document.getElementById('staff-name-display').textContent = cur.name || localStorage.getItem('name') || 'Field Staff';
                    const av = cur.availability || 'available';
                    document.getElementById('avail-select').value = av;
                    updateAvailBadge(av);
                } else {
                    document.getElementById('staff-name-display').textContent = localStorage.getItem('name') || 'Field Staff';
                    updateAvailBadge('available');
                }
            }
        }

        function updateAvailBadge(avail) {
            document.getElementById('avail-badge-container').innerHTML = UI.availBadge(avail);
        }

        document.getElementById('avail-select').addEventListener('change', async e => {
            const uid = localStorage.getItem('userId');
            const select = e.target;
            select.disabled = true;
            await UI.blockDuplicate('avail-change', async () => {
                const val = select.value;
                const r = await API.updateStaffAvailability(uid, val);
                select.disabled = false;
                if (r.success) {
                    UI.toast('success', 'Success', `Status updated to ${val.replace('_',' ')}`);
                    updateAvailBadge(val);
                } else {
                    UI.toast('error', 'Error', r.message || 'Failed to update status');
                }
            });
        });

        async function loadTickets() {
            try {
                const ticketList = document.getElementById('ticket-list');
                UI.skeleton(ticketList.parentElement, 4, 7);
                const result = await API.getAssigned();
                if (result.success) {
                    allTickets = result.tickets || [];
                    if (allTickets.length === 0) {
                        ticketList.innerHTML = `
                            <tr>
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="empty-state">
                                        <span class="empty-state-icon">🎫</span>
                                        <h5>No Tickets Assigned</h5>
                                        <p>You currently do not have any tickets assigned to you.</p>
                                    </div>
                                </td>
                            </tr>`;
                    } else {
                        renderTickets(allTickets);
                    }
                } else {
                    ticketList.innerHTML = `<tr><td colspan="7" class="text-danger text-center py-4">Failed to load tickets: ${result.message || 'Unknown error'}</td></tr>`;
                    UI.toast('error', 'Error', result.message || 'Failed to load tickets');
                }
            } catch (error) {
                console.error('Failed to load tickets:', error);
                UI.toast('error', 'Error', 'Failed to load tickets');
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function renderTickets(filteredTickets = allTickets) {
            const ticketList = document.getElementById('ticket-list');
            ticketList.innerHTML = '';
            
            if (filteredTickets.length === 0) {
                ticketList.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No tickets found</td></tr>';
                return;
            }

            filteredTickets.forEach(ticket => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td class="fw-semibold">${ticket.title}</td>
                    <td>${ticket.customerName || 'N/A'}</td>
                    <td>${formatDate(ticket.createdAt)}</td>
                    <td>${UI.statusBadge(ticket.status)}</td>
                    <td>${UI.priorityBadge(ticket.priority)}</td>
                    <td>
                        <button class="view-details-btn btn btn-sm btn-outline-primary" style="background:transparent !important; color:var(--primary-color) !important" onclick="viewTicketDetails('${ticket.id}')">Details</button>
                    </td>
                `;
                ticketList.appendChild(row);
            });
        }

        // Filter by status
        document.getElementById('status-filter').addEventListener('change', (e) => {
            const status = e.target.value;
            const filteredTickets = status 
                ? allTickets.filter(t => t.status.toLowerCase().replace(' ', '-') === status)
                : allTickets;
            renderTickets(filteredTickets);
        });

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredTickets = allTickets.filter(t => 
                (t.title && t.title.toLowerCase().includes(searchTerm)) ||
                (t.id && t.id.toString().includes(searchTerm)) ||
                (t.customerName && t.customerName.toLowerCase().includes(searchTerm))
            );
            renderTickets(filteredTickets);
        });

        function viewTicketDetails(ticketId) {
            window.location.href = `ticket-details.html?id=${ticketId}`;
        }

        // Initial load
        loadAvailability();
        loadTickets();
    </script>
</body>
</html>
