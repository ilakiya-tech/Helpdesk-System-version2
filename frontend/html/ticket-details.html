<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Details - Carbochem Helpdesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="../css/sidebar.css" rel="stylesheet"/>
  <link href="../css/theme.css" rel="stylesheet"/>
  <style>
    :root { --primary-color: #1F3373; --background-light: #f0f4f8; }
    body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
    .detail-card { background: #fff; border-radius: 12px; padding: 1.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; margin-bottom: 1.25rem; }
    .timeline-item { border-left: 3px solid var(--primary-color); padding-left: 1rem; margin-bottom: 1.25rem; position: relative; }
    .comment-box { background: #f8fafc; border-radius: 10px; padding: 1rem; border: 1px solid #e2e8f0; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark" style="background: var(--primary-color); padding: 0.75rem 1.5rem;">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1 fw-bold">🎫 Ticket Details</span>
      <a href="#" class="btn btn-outline-light btn-sm" style="background:transparent !important; color:#fff !important; border-color:#fff !important" id="back-btn">← Back</a>
    </div>
  </nav>
  <div class="container py-4">
    <div id="loading" class="text-center py-5">
      <div class="spinner-container"><div class="loading-spinner"></div></div>
    </div>
    <div id="error-message" class="alert alert-danger d-none"></div>
    <div id="content" class="d-none">
      <div id="holiday-warning" class="alert alert-warning d-none">⚠️ Ticket deadline falls on a holiday!</div>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="detail-card">
            <div class="row g-3" id="ticket-fields"></div>
            <div class="mt-4 border-top pt-3" id="ticket-attachments-section" style="display: none;">
              <label class="form-label text-muted small fw-semibold mb-2">Attachments</label>
              <div id="attachments-list" class="d-flex flex-column gap-2"></div>
            </div>
            <div class="mt-4" id="status-actions"></div>
          </div>
          <div class="detail-card">
            <h5 class="fw-bold mb-3">Comments & Notes</h5>
            <div id="comments-list"></div>
            <form id="comment-form" class="mt-3">
              <textarea class="form-control mb-3" id="comment-text" rows="2" placeholder="Add a note..." required></textarea>
              <button type="submit" class="btn btn-primary btn-sm comment-submit-btn">Add Comment</button>
            </form>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="detail-card">
            <h5 class="fw-bold mb-3">Audit Trail</h5>
            <div id="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    const userRole = normalizeRole(localStorage.getItem('userRole'));
    const backUrls = { admin: 'admin.html', staff: 'staff.html', consumer: 'client.html' };
    document.getElementById('back-btn').href = backUrls[userRole] || 'index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('id');
    let currentTicket = null;

    const priorityDays = { High: 1, Critical: 1, Medium: 3, Low: 7 };

    async function loadAll() {
      if (!ticketId) { showError('No ticket ID provided'); return; }
      const [tr, hr, cr, holR] = await Promise.all([
        API.getTicketById(ticketId),
        API.getTicketHistory(ticketId),
        API.getComments(ticketId),
        API.getHolidaysPublic()
      ]);
      if (!tr.success) { showError(tr.message || 'Not found'); return; }
      currentTicket = tr.ticket;
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');
      renderTicket(currentTicket);
      renderHistory(hr.history || currentTicket.history || tr.history || []);
      renderComments(cr.comments || currentTicket.comments || tr.comments || []);
      renderAttachments(tr.attachments || currentTicket.attachments || []);
      checkHolidayWarning(currentTicket, holR.holidays || []);
    }

    function renderAttachments(attachments) {
      const section = document.getElementById('ticket-attachments-section');
      const list = document.getElementById('attachments-list');
      if (!attachments || !attachments.length) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = attachments.map(att => {
        const sizeKb = Math.round(att.fileSize / 1024 * 10) / 10;
        return `
          <div class="d-flex align-items-center justify-content-between p-2 border rounded" style="background: #f8fafc; font-size: 0.85rem;">
            <div class="d-flex align-items-center gap-2">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              <span class="fw-semibold text-truncate" style="max-width: 200px;">${att.fileName}</span>
              <span class="text-muted small">(${sizeKb} KB)</span>
            </div>
            <button class="btn btn-link btn-sm p-0 text-decoration-none fw-semibold" style="font-size: 0.8rem; color: var(--primary-color);" onclick="downloadAttachment(${att.id}, '${att.fileName.replace(/'/g, "\\'")}')">Download</button>
          </div>
        `;
      }).join('');
    }

    async function downloadAttachment(id, name) {
      try {
        await API.downloadAttachment(id, name);
      } catch (e) {
        UI.toast('error', 'Download Failed', e.message || 'Could not download file');
      }
    }

    function renderTicket(t) {
      const estDays = priorityDays[t.priority] || 3;

      // SLA badge
      const slaColors = { 'IN SLA': '#16a34a', 'AT RISK': '#ea580c', 'BREACHED': '#dc2626' };
      const slaColor = slaColors[t.slaStatus] || '#6b7280';
      const slaBadge = t.slaStatus
        ? `<span style="background:${slaColor};color:#fff;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:600">${t.slaStatus}</span>`
        : '<span class="text-muted">N/A</span>';

      // Remaining time
      const remainingMin = t.remainingTime;
      let remainingHtml = '<span class="text-muted">N/A</span>';
      if (remainingMin !== null && remainingMin !== undefined) {
        const isOverdue = remainingMin < 0;
        const absMin = Math.abs(remainingMin);
        const h = Math.floor(absMin / 60), m = absMin % 60;
        const label = isOverdue
          ? `<span style="color:#dc2626;font-weight:600">Overdue by ${h > 0 ? h + 'h ' : ''}${m}m</span>`
          : `<span style="color:${slaColor};font-weight:600">${h > 0 ? h + 'h ' : ''}${m}m remaining</span>`;
        remainingHtml = label;
      } else if (t.status === 'Resolved' || t.status === 'Closed') {
        remainingHtml = '<span class="text-success fw-semibold">Completed</span>';
      }

      const fields = [
        ['Ticket ID', '#' + t.id],
        ['Title', t.title],
        ['Description', t.description],
        ['Category', t.category],
        ['Priority', t.priority + (userRole === 'consumer' ? ` <small class="text-muted">(Est. ${estDays} day${estDays>1?'s':''} resolution)</small>` : '')],
        ['Status', UI.statusBadge(t.status)],
        ['Raised By', t.createdByName || t.createdBy || t.customerName],
        ['Assigned To', t.assignedTo || 'Unassigned'],
        ['Date Created', fmt(t.createdAt)],
        ['Date Assigned', t.assignedAt ? fmt(t.assignedAt) : 'Not yet assigned'],
        ['Last Updated', fmt(t.updatedAt || t.createdAt)],
        ['Due Date', t.dueDate ? fmt(t.dueDate) : 'N/A'],
        // SLA Fields
        ['SLA Status', slaBadge],
        ['Remaining Time', remainingHtml],
        ['Response Deadline', t.responseSlaDeadline ? fmt(t.responseSlaDeadline) : 'N/A'],
        ['Resolution Deadline', t.resolutionSlaDeadline ? fmt(t.resolutionSlaDeadline) : 'N/A'],
        ['First Response At', t.firstRespondedAt ? fmt(t.firstRespondedAt) : 'Awaiting response'],
        ['Resolved At', t.resolvedAt ? fmt(t.resolvedAt) : 'Not yet resolved']
      ];
      document.getElementById('ticket-fields').innerHTML = fields.map(([l,v]) =>
        `<div class="col-md-6 mb-3"><label class="form-label text-muted small fw-semibold mb-1">${l}</label><div style="font-size:0.95rem">${v}</div></div>`).join('');

      const actions = document.getElementById('status-actions');
      if (userRole === 'staff' || userRole === 'admin') {
        const statuses = ['Open','In Progress','Resolved','Closed'];
        const cur = statuses.indexOf(t.status);
        const next = statuses.slice(Math.max(0, cur)).filter(s => s !== t.status);
        actions.innerHTML = next.length ? `<label class="form-label fw-semibold small text-muted mb-2">Update Status</label>
          <div class="d-flex gap-2 flex-wrap">${next.map(s => `<button class="btn btn-outline-primary btn-sm status-action-btn" data-status="${s}" onclick="updateStatus('${s}', this)">${s}</button>`).join('')}</div>` : '';
      } else actions.innerHTML = '';
    }

    function renderHistory(history) {
      const el = document.getElementById('history-list');
      if (!history.length) { el.innerHTML = '<p class="text-muted small">No history yet</p>'; return; }
      el.innerHTML = history.map(h => `
        <div class="timeline-item">
          <strong style="font-size:0.9rem">${h.changedByName || 'System'}</strong> – <span class="small">${h.action.replace(/_/g,' ')}</span>
          ${h.field ? `<br><small class="text-muted">${h.field}: ${h.oldValue || ''} → ${h.newValue || ''}</small>` : ''}
          <br><small class="text-muted" style="font-size:0.75rem">${fmt(h.createdAt)}</small>
        </div>`).join('');
    }

    function renderComments(comments) {
      const el = document.getElementById('comments-list');
      if (!comments.length) { el.innerHTML = '<p class="text-muted small">No comments yet</p>'; return; }
      el.innerHTML = comments.map(c => `
        <div class="comment-box"><strong>${c.authorName || 'User'}</strong> <small class="text-muted ms-2">${fmt(c.createdAt)}</small><br><div class="mt-1" style="font-size:0.92rem">${c.text}</div></div>`).join('');
    }

    function checkHolidayWarning(ticket, holidays) {
      if (!ticket.dueDate) return;
      const due = new Date(ticket.dueDate).toISOString().split('T')[0];
      if (holidays.some(h => h.date && h.date.startsWith(due))) {
        document.getElementById('holiday-warning').classList.remove('d-none');
      }
    }

    async function updateStatus(status, btn) {
      const buttons = document.querySelectorAll('.status-action-btn');
      await UI.blockDuplicate('update-status', async () => {
        buttons.forEach(b => b.disabled = true);
        if (btn) UI.setLoading(btn, true, 'Updating…');
        const r = await API.updateTicketStatus(currentTicket._id || ticketId, status);
        if (r.success) {
          UI.toast('success', 'Success', `Ticket moved to ${status}`);
          currentTicket = r.ticket || r;
          loadAll();
        } else {
          UI.toast('error', 'Update Failed', r.message || 'Could not update status');
          buttons.forEach(b => b.disabled = false);
          if (btn) UI.setLoading(btn, false);
        }
      });
    }

    document.getElementById('comment-form').addEventListener('submit', async e => {
      e.preventDefault();
      const textEl = document.getElementById('comment-text');
      const text = textEl.value.trim();
      if (!text) return;
      const btn = e.target.querySelector('.comment-submit-btn');

      await UI.blockDuplicate('add-comment', async () => {
        UI.setLoading(btn, true, 'Sending…');
        const r = await API.addComment(currentTicket._id || ticketId, text);
        UI.setLoading(btn, false);
        if (r.success) {
          textEl.value = '';
          UI.toast('success', 'Success', 'Comment added successfully');
          loadAll();
        } else {
          UI.toast('error', 'Comment Failed', r.message || 'Could not add comment');
        }
      });
    });

    function fmt(d) { return d ? new Date(d).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }) : 'N/A'; }
    function showError(msg) {
      document.getElementById('loading').classList.add('d-none');
      const el = document.getElementById('error-message');
      el.textContent = msg; el.classList.remove('d-none');
    }
    loadAll();
  </script>
</body>
</html>
