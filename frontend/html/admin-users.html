<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1F3373; --background-light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .main-content { flex: 1; padding: 1.5rem; }
        .error-feedback { color: #dc2626; font-size: 0.8rem; margin-top: 4px; display: none; }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <header id="sidebar-container"></header>
    <main class="main-content">
        <h2 class="mb-4 text-primary fw-bold">User Management</h2>
        <div class="card mb-4"><div class="card-body">
            <h5 class="card-title fw-bold text-primary mb-3" style="font-size: 1rem;">Create New User</h5>
            <form id="create-user-form" class="row g-3" novalidate>
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="u-name" required placeholder="e.g. John Doe">
                    <div class="error-feedback" id="name-error">Please enter full name</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="u-email" required placeholder="e.g. john@carbochem.com">
                    <div class="error-feedback" id="email-error">Please enter a valid email</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="u-username" required placeholder="Enter username">
                    <div class="error-feedback" id="username-error">Username is required</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="u-password" required minlength="6" placeholder="Min 6 characters">
                    <div class="error-feedback" id="password-error">Password must be at least 6 characters</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="u-role" required>
                        <option value="staff">Staff</option>
                        <option value="client">Consumer</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="u-phone" placeholder="e.g. 9876543210">
                    <div class="error-feedback" id="phone-error">Phone must be exactly 10 digits</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" id="u-dept" placeholder="e.g. Sales / Production">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary" id="create-user-btn">Create User</button>
                </div>
            </form>
        </div></div>
        
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr>
                        <td colspan="7" class="text-center py-4 text-muted">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireAuth(['admin'])) throw new Error('auth');
Sidebar.inject('admin', 'admin-users.html');

let allUsers = [];

async function loadUsers() {
    const tbody = document.getElementById('users-table');
    UI.skeleton(tbody.parentElement, 5, 7);
    const r = await API.getUsers();
    if (!r.success) {
        tbody.innerHTML = `
            <tr>
                <td colspan="7" class="text-center py-4 text-danger">
                    Failed to load users
                </td>
            </tr>`;
        UI.toast('error', 'Error', 'Failed to load users list');
        return;
    }
    allUsers = r.users || [];
    tbody.innerHTML = allUsers.filter(u => u.role !== 'admin').map(u => `
        <tr>
            <td>${u.name || '-'}</td>
            <td>${u.username}</td>
            <td>${UI.roleBadge(u.role)}</td>
            <td>${u.email || '-'}</td>
            <td>${u.mobile || '-'}</td>
            <td><span class="badge bg-success" style="background-color:rgba(22,101,52,0.05) !important; color:#166534 !important; border:1px solid rgba(22,101,52,0.12) !important; font-size:0.75rem;">Active</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary" style="background:transparent !important; color:var(--primary-color) !important" onclick="resetPw('${u.id}', this)">Reset PW</button>
            </td>
        </tr>`).join('');
}

async function resetPw(id, btn) {
    const pw = prompt('Enter new password (min 6 chars):');
    if (pw === null) return;
    if (pw.length < 6) {
        UI.toast('warning', 'Warning', 'Password must be at least 6 characters');
        return;
    }
    
    await UI.blockDuplicate('reset-' + id, async () => {
        if (btn) UI.setLoading(btn, true, 'Resetting…');
        const r = await API.resetUserPassword(id, pw);
        if (btn) UI.setLoading(btn, false);
        if (r.success) {
            UI.toast('success', 'Success', 'Password reset successfully!');
        } else {
            UI.toast('error', 'Error', r.message || 'Reset failed');
        }
    });
}

document.getElementById('create-user-form').addEventListener('submit', async e => {
    e.preventDefault();
    document.querySelectorAll('.error-feedback').forEach(el => el.style.display = 'none');
    
    const name = document.getElementById('u-name').value.trim();
    const email = document.getElementById('u-email').value.trim();
    const username = document.getElementById('u-username').value.trim();
    const password = document.getElementById('u-password').value;
    const role = document.getElementById('u-role').value;
    const phone = document.getElementById('u-phone').value.trim();
    const department = document.getElementById('u-dept').value.trim();
    
    let isValid = true;
    
    if (!name) { document.getElementById('name-error').style.display = 'block'; isValid = false; }
    if (!UI.validateEmail(email)) { document.getElementById('email-error').style.display = 'block'; isValid = false; }
    if (!username) { document.getElementById('username-error').style.display = 'block'; isValid = false; }
    if (!UI.validatePassword(password)) { document.getElementById('password-error').style.display = 'block'; isValid = false; }
    if (phone && !UI.validatePhone(phone)) { document.getElementById('phone-error').style.display = 'block'; isValid = false; }
    
    if (!isValid) return;
    
    const dup = UI.checkDuplicateUser(allUsers, { username, email });
    if (!dup.ok) {
        UI.toast('warning', 'Duplicate Registration', dup.message);
        return;
    }
    
    const btn = document.getElementById('create-user-btn');
    await UI.blockDuplicate('create-user', async () => {
        UI.setLoading(btn, true, 'Creating…');
        const r = await API.createUser({
            name,
            email,
            username,
            password,
            role,
            mobile: phone,
            department
        });
        UI.setLoading(btn, false);
        if (r.success) {
            UI.toast('success', 'Success', 'User created successfully!');
            e.target.reset();
            loadUsers();
        } else {
            UI.toast('error', 'Error', r.message || 'Failed to create user');
        }
    });
});

loadUsers();
</script>
</body>
</html>
