<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1F3373;
            --secondary-color: #2b479e;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --white: #ffffff;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-box {
            background-color: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .register-box label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 14px;
        }

        .register-box input[type="text"],
        .register-box input[type="password"],
        .register-box select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .register-box input:focus,
        .register-box select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .register-box button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .register-box button:hover {
            background-color: var(--secondary-color);
        }

        .register-box button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .error {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background-color: var(--success-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Register New User</h2>
    
    <div class="success-message" id="success-message"></div>

    <form id="register-form">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <div class="error" id="error-message">Passwords do not match</div>
        </div>

        <div class="form-group">
            <label>Role:</label>
            <select id="role" name="role" required>
                <option value="">-- Select Role --</option>
                <option value="admin">Admin</option>
                <option value="staff">Field Staff</option>
                <option value="client">Consumer</option>
            </select>
        </div>

        <button type="submit">Register User</button>
    </form>

    <div class="back-link">
        <a href="admin.html">← Back to Dashboard</a>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    // Check if admin is logged in
    if (!localStorage.getItem('token') || localStorage.getItem('userRole') !== 'admin') {
        alert('Only administrators can register new users');
        window.location.href = 'index.html';
    }

    const registerForm = document.getElementById('register-form');
    const submitButton = registerForm.querySelector('button[type="submit"]');

    registerForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const role = document.getElementById('role').value;
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        // Hide previous messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        // Validate passwords match
        if (password !== confirmPassword) {
            errorMsg.style.display = 'block';
            return;
        }

        // Validate password length
        if (password.length < 6) {
            errorMsg.textContent = 'Password must be at least 6 characters';
            errorMsg.style.display = 'block';
            return;
        }

        // Disable submit button
        submitButton.disabled = true;
        submitButton.textContent = 'Registering...';

        try {
            // Call API to register user
            const result = await API.registerUser(username, password, role);

            if (result.success) {
                // Show success message
                successMsg.textContent = `User "${username}" registered successfully as ${role}!`;
                successMsg.style.display = 'block';

                // Reset form
                registerForm.reset();

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 2000);
            } else {
                alert('Registration failed: ' + (result.message || 'Unknown error'));
            }
        } catch (error) {
            console.error('Registration error:', error);
            alert('Registration failed. Please try again.');
        } finally {
            // Re-enable submit button
            submitButton.disabled = false;
            submitButton.textContent = 'Register User';
        }
    });

    // Real-time password validation
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('password').value;
        const confirmPassword = this.value;
        const errorMsg = document.getElementById('error-message');

        if (confirmPassword && password !== confirmPassword) {
            errorMsg.textContent = 'Passwords do not match';
            errorMsg.style.display = 'block';
        } else {
            errorMsg.style.display = 'none';
        }
    });
</script>

</body>
</html>
