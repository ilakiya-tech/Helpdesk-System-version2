<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1F3373;
            --secondary-color: #2b479e;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --white: #ffffff;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-box {
            background-color: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid #e2e8f0;
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .register-box label {
            display: block;
            font-weight: 550;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
        }

        .error {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background-color: #f0fdf4;
            color: #166534;
            border: 1.5px solid #bbf7d0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-link a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Register New User</h2>
    
    <div class="success-message" id="success-message"></div>

    <form id="register-form" novalidate>
        <div class="form-group">
            <label>Username:</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" class="form-control" name="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            <div class="error" id="error-message">Passwords do not match</div>
        </div>

        <div class="form-group">
            <label>Role:</label>
            <select class="form-select" id="role" name="role" required>
                <option value="">-- Select Role --</option>
                <option value="admin">Admin</option>
                <option value="staff">Field Staff</option>
                <option value="client">Consumer</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2">Register User</button>
    </form>

    <div class="back-link">
        <a href="admin.html">← Back to Dashboard</a>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script>
    if (!requireAuth(['admin'])) throw new Error('auth');

    const registerForm = document.getElementById('register-form');
    const submitButton = registerForm.querySelector('button[type="submit"]');

    registerForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const role = document.getElementById('role').value;
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        // Hide previous messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!username) {
            UI.toast('warning', 'Warning', 'Username is required');
            return;
        }

        // Validate passwords match
        if (password !== confirmPassword) {
            errorMsg.textContent = 'Passwords do not match';
            errorMsg.style.display = 'block';
            UI.toast('warning', 'Warning', 'Passwords do not match');
            return;
        }

        // Validate password length
        if (!UI.validatePassword(password)) {
            errorMsg.textContent = 'Password must be at least 6 characters';
            errorMsg.style.display = 'block';
            UI.toast('warning', 'Warning', 'Password is too short');
            return;
        }

        if (!role) {
            UI.toast('warning', 'Warning', 'Please select a role');
            return;
        }

        await UI.blockDuplicate('register-user', async () => {
            UI.setLoading(submitButton, true, 'Registering…');

            try {
                // Call API to register user
                const result = await API.registerUser(username, password, role);

                if (result.success) {
                    UI.toast('success', 'User Registered', `User "${username}" registered successfully!`);
                    // Show success message
                    successMsg.textContent = `User "${username}" registered successfully as ${role}!`;
                    successMsg.style.display = 'block';

                    // Reset form
                    registerForm.reset();

                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 2000);
                } else {
                    UI.toast('error', 'Registration Failed', result.message || 'Unknown error');
                    UI.setLoading(submitButton, false);
                }
            } catch (error) {
                console.error('Registration error:', error);
                UI.toast('error', 'Error', 'Failed to register user. Please try again.');
                UI.setLoading(submitButton, false);
            }
        });
    });

    // Real-time password validation
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('password').value;
        const confirmPassword = this.value;
        const errorMsg = document.getElementById('error-message');

        if (confirmPassword && password !== confirmPassword) {
            errorMsg.textContent = 'Passwords do not match';
            errorMsg.style.display = 'block';
        } else {
            errorMsg.style.display = 'none';
        }
    });
</script>

</body>
</html>
