<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Consumer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1F3373; --background-light: #f0f4f8; --border-color: #d1d5db; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .ticket-card { background: #fff; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; transition: all 0.2s; }
        .ticket-card:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,0.08); }
        .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary-color); display: inline-block; margin-right: 8px; }
        @media (max-width:768px) { .layout-row { flex-direction: column !important; } }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <div class="flex-grow-1 main-content">
        <div class="dashboard">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="mb-0 text-primary fw-bold">My Support Tickets</h2>
                <a href="create-ticket.html" class="btn btn-primary">➕ Raise Ticket</a>
            </div>

            <!-- Compact metrics card grid -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-primary fw-bold" id="stat-open">0</h4>
                        <small class="text-muted">Open</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-primary fw-bold" id="stat-inprogress">0</h4>
                        <small class="text-muted">In Progress</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-success fw-bold" id="stat-resolved">0</h4>
                        <small class="text-muted">Resolved</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-secondary fw-bold" id="stat-closed">0</h4>
                        <small class="text-muted">Closed</small>
                    </div>
                </div>
            </div>

            <div class="alert alert-info py-2 mb-4 small" id="holiday-notice" style="display:none"></div>

            <div class="card mb-4"><div class="card-body py-3">
                <div class="mb-0">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search tickets by ID, title, status, priority...">
                </div>
            </div></div>

            <div id="tickets" class="ticket-list"></div>
        </div>
    </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!requireAuth(['consumer'])) throw new Error('auth');

// Inject Sidebar
Sidebar.inject('client', 'client.html');

const priorityDays = { High: 1, Critical: 1, Medium: 3, Low: 7 };
let allTickets = [];

function countByStatus(tickets) {
    const c = { open: 0, assigned: 0, inprogress: 0, resolved: 0, closed: 0 };
    tickets.forEach(t => {
        const s = (t.status || '').toLowerCase().replace(/\s+/g, '');
        if (c[s] !== undefined) c[s]++;
    });
    return c;
}

async function loadTickets() {
    const el = document.getElementById('tickets');
    UI.skeleton(el, 4, 3);
    const r = await API.getMyTickets();
    if (r.success) {
        allTickets = r.tickets || [];
        const c = countByStatus(allTickets);
        
        document.getElementById('stat-open').textContent = c.open + c.assigned;
        document.getElementById('stat-inprogress').textContent = c.inprogress;
        document.getElementById('stat-resolved').textContent = c.resolved;
        document.getElementById('stat-closed').textContent = c.closed;

        if (allTickets.length === 0) {
            el.innerHTML = `
                <div class="empty-state">
                    <span class="empty-state-icon">🎫</span>
                    <h5>No Tickets Found</h5>
                    <p>You have not raised any support tickets yet.</p>
                    <a href="create-ticket.html" class="btn btn-primary mt-2">Raise Ticket</a>
                </div>`;
        } else {
            renderTickets(allTickets);
        }
    } else {
        el.innerHTML = `<p class="text-danger text-center">Failed to load tickets: ${r.message || 'Unknown error'}</p>`;
        UI.toast('error', 'Error', r.message || 'Failed to load tickets');
    }
}

async function loadHolidayNotice() {
    const r = await API.getHolidaysPublic();
    const now = new Date();
    const upcoming = (r.holidays || []).filter(h => new Date(h.date) >= now).slice(0, 1);
    const noticeEl = document.getElementById('holiday-notice');
    if (upcoming.length) {
        noticeEl.innerHTML = `📅 <strong>Upcoming holiday:</strong> ${upcoming[0].name} (${new Date(upcoming[0].date).toLocaleDateString()})`;
        noticeEl.style.display = 'block';
    } else {
        noticeEl.style.display = 'none';
    }
}

async function renderTickets(tickets) {
    const el = document.getElementById('tickets');
    if (!tickets.length) {
        el.innerHTML = `<div class="card"><div class="card-body">${UI.emptyState('No tickets match your search', '🔍')}</div></div>`;
        return;
    }

    el.innerHTML = await Promise.all(tickets.map(async t => {
        const days = priorityDays[t.priority] || 3;
        const hr = await API.getTicketHistory(t._id || t.id);
        const history = (hr.history || []).slice(-4);
        return `<div class="ticket-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <strong>#${t.id}</strong> – ${t.title}<br>
                    <div class="mt-2">
                        ${UI.statusBadge(t.status)} 
                        ${UI.priorityBadge(t.priority)}
                        <small class="text-muted ms-2">Est. resolution: ${days} day${days>1?'s':''}</small>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-primary" style="background:transparent !important; color:var(--primary-color) !important" onclick="location.href='ticket-details.html?id=${t._id || t.id}'">View Details</button>
            </div>
            <div class="mt-3 small"><strong>Timeline:</strong></div>
            <div class="ms-2 mt-1">${history.length ? history.map(h =>
                `<div class="small mb-1"><span class="timeline-dot"></span>${h.action.replace(/_/g,' ')} – ${h.changedByName || 'System'} <em class="text-muted">${new Date(h.createdAt).toLocaleString()}</em></div>`
            ).join('') : '<small class="text-muted">No activity yet</small>'}</div>
            <form class="mt-3 comment-form" data-id="${t._id || t.id}">
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control" placeholder="Add a comment..." required>
                    <button class="btn btn-primary comment-btn" type="submit">Send</button>
                </div>
            </form>
        </div>`;
    })).then(html => html.join(''));

    document.querySelectorAll('.comment-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const btn = form.querySelector('.comment-btn');
            const input = form.querySelector('input');
            const text = input.value.trim();
            if (!text) return;

            await UI.blockDuplicate('comment-' + form.dataset.id, async () => {
                UI.setLoading(btn, true, 'Sending…');
                const r = await API.addComment(form.dataset.id, text);
                UI.setLoading(btn, false);
                if (r.success) {
                    input.value = '';
                    UI.toast('success', 'Success', 'Comment added successfully');
                    loadTickets();
                } else {
                    UI.toast('error', 'Failed', r.message || 'Could not add comment');
                }
            });
        });
    });
}

function filterTickets() {
    const q = document.getElementById('searchInput').value.trim();
    const filtered = UI.filterItems(allTickets, q, ['id', 'title', 'status', 'priority']);
    renderTickets(filtered);
}

document.getElementById('searchInput').addEventListener('input', filterTickets);

loadHolidayNotice();
loadTickets();
</script>
</body>
</html>
