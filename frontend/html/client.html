<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Consumer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1F3373; --background-light: #f0f4f8; --border-color: #d1d5db; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .ticket-card { background: #fff; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-color); display: inline-block; margin-right: 8px; }
        @media (max-width:768px) { .layout-row { flex-direction: column !important; } }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <div class="flex-grow-1 main-content">
        <div class="dashboard">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="mb-0 text-primary">My Support Tickets</h2>
                <a href="create-ticket.html" class="btn btn-primary">➕ Raise Ticket</a>
            </div>

            <!-- Compact metrics card grid -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-primary fw-bold" id="stat-open">0</h4>
                        <small class="text-muted">Open</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-primary fw-bold" id="stat-inprogress">0</h4>
                        <small class="text-muted">In Progress</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-success fw-bold" id="stat-resolved">0</h4>
                        <small class="text-muted">Resolved</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card mb-0 text-center py-3">
                        <h4 class="mb-0 text-secondary fw-bold" id="stat-closed">0</h4>
                        <small class="text-muted">Closed</small>
                    </div>
                </div>
            </div>

            <div class="alert alert-info py-2 mb-4 small" id="holiday-notice" style="display:none"></div>

            <div class="card mb-4"><div class="card-body py-3">
                <div class="mb-0">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search tickets by ID or title...">
                </div>
            </div></div>

            <div id="tickets" class="ticket-list"></div>
        </div>
    </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!localStorage.getItem('token') || localStorage.getItem('userRole') !== 'client') {
    window.location.href = 'index.html';
}

// Inject Sidebar
Sidebar.inject('client', 'client.html');

const priorityDays = { High: 1, Critical: 1, Medium: 3, Low: 7 };
let allTickets = [];

async function loadTickets() {
    const el = document.getElementById('tickets');
    el.innerHTML = `
        <div class="spinner-container">
            <div class="loading-spinner"></div>
        </div>`;
    const r = await API.getMyTickets();
    if (r.success) {
        allTickets = r.tickets || [];
        
        // Calculate status counts
        let open = 0, inProgress = 0, resolved = 0, closed = 0;
        allTickets.forEach(t => {
            const status = t.status.toLowerCase().replace(' ', '');
            if (status === 'open') open++;
            else if (status === 'inprogress') inProgress++;
            else if (status === 'resolved') resolved++;
            else if (status === 'closed') closed++;
        });
        
        document.getElementById('stat-open').textContent = open;
        document.getElementById('stat-inprogress').textContent = inProgress;
        document.getElementById('stat-resolved').textContent = resolved;
        document.getElementById('stat-closed').textContent = closed;

        if (allTickets.length === 0) {
            el.innerHTML = `
                <div class="empty-state">
                    <span class="empty-state-icon">🎫</span>
                    <h5>No Tickets Found</h5>
                    <p>You have not raised any support tickets yet.</p>
                    <a href="create-ticket.html" class="btn btn-primary mt-2">Raise Ticket</a>
                </div>`;
        } else {
            renderTickets(allTickets);
        }
    } else {
        el.innerHTML = `<p class="text-danger text-center">Failed to load tickets: ${r.message || 'Unknown error'}</p>`;
    }
}

async function loadHolidayNotice() {
    const r = await API.getHolidaysPublic();
    const now = new Date();
    const upcoming = (r.holidays || []).filter(h => new Date(h.date) >= now).slice(0, 1);
    const noticeEl = document.getElementById('holiday-notice');
    if (upcoming.length) {
        noticeEl.innerHTML = `📅 <strong>Upcoming holiday:</strong> ${upcoming[0].name} (${new Date(upcoming[0].date).toLocaleDateString()})`;
        noticeEl.style.display = 'block';
    } else {
        noticeEl.style.display = 'none';
    }
}

async function renderTickets(tickets) {
    const el = document.getElementById('tickets');
    if (!tickets.length) { el.innerHTML = '<p class="text-muted">No tickets found. <a href="create-ticket.html">Raise a ticket</a></p>'; return; }

    el.innerHTML = await Promise.all(tickets.map(async t => {
        const days = priorityDays[t.priority] || 3;
        const hr = await API.getTicketHistory(t._id || t.id);
        const history = (hr.history || []).slice(-5);
        return `<div class="ticket-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div><strong>#${t.id}</strong> – ${t.title}<br>
                <span class="badge bg-primary">${t.status}</span> <span class="badge bg-secondary">${t.priority}</span>
                <small class="text-muted ms-2">Est. resolution: ${days} day${days>1?'s':''}</small></div>
                <button class="btn btn-sm btn-outline-primary" onclick="location.href='ticket-details.html?id=${t._id || t.id}'">View Details</button>
            </div>
            <div class="mt-2 small"><strong>Timeline:</strong></div>
            <div class="ms-2 mt-1">${history.length ? history.map(h =>
                `<div class="small"><span class="timeline-dot"></span>${h.action.replace(/_/g,' ')} – ${h.changedByName || 'System'} <em class="text-muted">${new Date(h.createdAt).toLocaleString()}</em></div>`
            ).join('') : '<small class="text-muted">No activity yet</small>'}</div>
            <form class="mt-2 comment-form" data-id="${t._id || t.id}">
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control" placeholder="Add a comment..." required>
                    <button class="btn btn-primary">Send</button>
                </div>
            </form>
        </div>`;
    })).then(html => html.join(''));

    document.querySelectorAll('.comment-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const text = form.querySelector('input').value;
            const r = await API.addComment(form.dataset.id, text);
            if (r.success) { form.querySelector('input').value = ''; loadTickets(); }
        });
    });
}

document.getElementById('searchInput').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    renderTickets(allTickets.filter(t => t.id.toString().includes(term) || t.title.toLowerCase().includes(term)));
});

loadHolidayNotice();
loadTickets();
</script>
</body>
</html>
