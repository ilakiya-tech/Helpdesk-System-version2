<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>.panel-hidden{display:none!important}</style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <main class="main-content">
        <h1 class="page-title">Staff Management</h1>
        <p class="page-subtitle">Monitor staff availability and ticket assignments</p>

        <div class="filter-bar mb-3">
            <input type="text" class="form-control" id="staff-search" placeholder="Search by name, email, department…">
            <select class="form-select" id="avail-filter" style="max-width:180px">
                <option value="">All Availability</option>
                <option value="available">Available</option>
                <option value="busy">Busy</option>
                <option value="on_leave">On Leave</option>
            </select>
        </div>

        <div class="card mb-4"><div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Department</th><th>Availability</th><th>Assigned</th><th>Actions</th></tr></thead>
                <tbody id="staff-table"></tbody>
            </table>
        </div></div>

        <div class="card panel-hidden" id="staff-tickets-panel"><div class="card-body table-responsive">
            <h5 id="staff-tickets-title" class="mb-3">Assigned Tickets</h5>
            <table class="table table-sm"><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Reassign</th></tr></thead>
            <tbody id="staff-tickets-body"></tbody></table>
        </div></div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!requireAuth(['admin'])) throw new Error('auth');
Sidebar.inject('admin', 'admin-staff.html');

let allStaff = [], allTickets = [];

function countAssigned(staff) {
    const name = staff.name || staff.username;
    return allTickets.filter(t =>
        t.assignedTo && (t.assignedTo === name || t.assignedTo === staff.username)
    ).length;
}

async function loadStaff() {
    const tableBody = document.getElementById('staff-table');
    tableBody.innerHTML = '<tr><td colspan="7"><div class="spinner-container"><div class="loading-spinner"></div></div></td></tr>';
    const [sr, tr] = await Promise.all([API.getStaffList(), API.getTickets()]);
    allStaff = (sr.staff || []).map(s => ({ ...s, assignedCount: 0 }));
    allTickets = tr.tickets || [];
    allStaff.forEach(s => { s.assignedCount = countAssigned(s); });
    renderStaff();
}

function renderStaff() {
    const term = document.getElementById('staff-search').value;
    const avail = document.getElementById('avail-filter').value;
    let filtered = UI.filterItems(allStaff, term, ['name', 'email', 'phone', 'department', 'username']);
    if (avail) filtered = filtered.filter(s => (s.availability || '').toLowerCase() === avail);
    const tbody = document.getElementById('staff-table');
    if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7">${UI.emptyState('No staff found', '🛠️')}</td></tr>`;
        return;
    }
    tbody.innerHTML = filtered.map(s => `
        <tr>
            <td><a href="#" onclick="showTickets('${s.userId}','${s.name}');return false;">${s.name}</a></td>
            <td>${s.email || '-'}</td><td>${s.phone || '-'}</td><td>${s.department || '-'}</td>
            <td>${UI.availBadge(s.availability)}</td>
            <td><span class="badge bg-primary">${s.assignedCount}</span></td>
            <td>
                <select class="form-select form-select-sm d-inline-block" style="width:auto" onchange="setAvail('${s.userId}', this.value, this)">
                    <option value="available" ${s.availability==='available'?'selected':''}>Available</option>
                    <option value="on_leave" ${s.availability==='on_leave'?'selected':''}>On Leave</option>
                    <option value="busy" ${s.availability==='busy'?'selected':''}>Busy</option>
                </select>
                <button class="btn btn-sm btn-outline-primary ms-1" onclick="showTickets('${s.userId}','${s.name}')">Tickets</button>
            </td>
        </tr>`).join('');
}

document.getElementById('staff-search').addEventListener('input', renderStaff);
document.getElementById('avail-filter').addEventListener('change', renderStaff);

async function setAvail(id, val, selectEl) {
    await UI.blockDuplicate('avail-' + id, async () => {
        if (selectEl) selectEl.disabled = true;
        const r = await API.updateStaffAvailability(id, val);
        if (selectEl) selectEl.disabled = false;
        if (r.success) {
            UI.toast('success', 'Updated', 'Availability updated');
            loadStaff();
        } else {
            UI.toast('error', 'Failed', r.message || 'Update failed');
        }
    });
}

function showTickets(staffId, name) {
    const staff = allStaff.find(s => String(s.userId) === String(staffId));
    const tickets = allTickets.filter(t => t.assignedTo === name || t.assignedTo === staff?.username);
    document.getElementById('staff-tickets-title').textContent = `Tickets assigned to ${name}`;
    document.getElementById('staff-tickets-panel').classList.remove('panel-hidden');
    document.getElementById('staff-tickets-body').innerHTML = tickets.length ? tickets.map(t => `
        <tr><td>#${t.id}</td><td>${t.title}</td><td>${UI.statusBadge(t.status)}</td><td>${UI.priorityBadge(t.priority)}</td>
        <td><select class="form-select form-select-sm" onchange="reassign('${t._id || t.id}', this.value, this)">
            <option value="">Reassign…</option>
            ${allStaff.filter(s => String(s.userId) !== String(staffId)).map(s => `<option value="${s.userId}">${s.name}</option>`).join('')}
        </select></td></tr>`).join('') : `<tr><td colspan="5">${UI.emptyState('No tickets assigned', '🎫')}</td></tr>`;
}

async function reassign(ticketId, staffId, selectEl) {
    if (!staffId) return;
    await UI.blockDuplicate('reassign-' + ticketId, async () => {
        if (selectEl) selectEl.disabled = true;
        const r = await API.assignTicketById(ticketId, staffId);
        if (selectEl) selectEl.disabled = false;
        if (r.success) {
            UI.toast('success', 'Reassigned', 'Ticket reassigned successfully');
            loadStaff();
        } else {
            UI.toast('error', 'Failed', r.message || 'Reassign failed');
            if (selectEl) selectEl.value = '';
        }
    });
}

loadStaff();
</script>
</body>
</html>
