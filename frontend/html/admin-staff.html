<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1F3373; --background-light: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .main-content { flex: 1; padding: 1.5rem; }
        .avail-available { color: #10b981; } .avail-on_leave { color: #f59e0b; } .avail-busy { color: #ef4444; }
        @media (max-width:768px) { .layout-row { flex-direction: column !important; } }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <aside id="sidebar-container"></aside>
    <main class="main-content">
        <h2 class="mb-4">Staff Management</h2>
        <div class="card mb-4"><div class="card-body table-responsive">
            <table class="table table-hover mb-0">
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Department</th><th>Availability</th><th>Assigned Tickets</th><th>Actions</th></tr></thead>
                <tbody id="staff-table"></tbody>
            </table>
        </div></div>
        <div class="card panel-hidden" id="staff-tickets-panel"><div class="card-body table-responsive">
            <h5 id="staff-tickets-title">Assigned Tickets</h5>
            <table class="table table-sm"><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Reassign</th></tr></thead>
            <tbody id="staff-tickets-body"></tbody></table>
        </div></div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!requireAuth(['admin'])) throw new Error('auth');
Sidebar.inject('admin', 'admin-staff.html');

let allStaff = [], allTickets = [];

async function loadStaff() {
    const tableBody = document.getElementById('staff-table');
    tableBody.innerHTML = `
        <tr>
            <td colspan="7" class="text-center py-4">
                <div class="spinner-container">
                    <div class="loading-spinner"></div>
                </div>
            </td>
        </tr>`;
    const [sr, tr] = await Promise.all([API.getStaffList(), API.getTickets()]);
    allStaff = sr.staff || [];
    allTickets = tr.tickets || [];
    document.getElementById('staff-table').innerHTML = allStaff.map(s => `
        <tr>
            <td><a href="#" onclick="showTickets('${s.userId}','${s.name}');return false;">${s.name}</a></td>
            <td>${s.email}</td><td>${s.phone || '-'}</td><td>${s.department || s.category || '-'}</td>
            <td><select class="form-select form-select-sm" onchange="setAvail('${s.userId}', this.value)">
                <option value="available" ${s.availability==='available'?'selected':''}>Available</option>
                <option value="on_leave" ${s.availability==='on_leave'?'selected':''}>On Leave</option>
                <option value="busy" ${s.availability==='busy'?'selected':''}>Busy</option>
            </select></td>
            <td>${s.assignedCount || 0}</td>
            <td><button class="btn btn-sm btn-outline-primary" onclick="showTickets('${s.userId}','${s.name}')">View Tickets</button></td>
        </tr>`).join('');
}

async function setAvail(id, val) { await API.updateStaffAvailability(id, val); loadStaff(); }

function showTickets(staffId, name) {
    const staff = allStaff.find(s => s.userId === staffId);
    const tickets = allTickets.filter(t => t.assignedTo === name || t.assignedTo === staff?.username);
    document.getElementById('staff-tickets-title').textContent = `Tickets assigned to ${name}`;
    document.getElementById('staff-tickets-panel').classList.remove('panel-hidden');
    document.getElementById('staff-tickets-body').innerHTML = tickets.length ? tickets.map(t => `
        <tr><td>#${t.id}</td><td>${t.title}</td><td>${t.status}</td><td>${t.priority}</td>
        <td><select class="form-select form-select-sm" id="reassign-${t._id || t.id}" onchange="reassign('${t._id || t.id}', this.value)">
            <option value="">Reassign to...</option>
            ${allStaff.filter(s => s.userId !== staffId).map(s => `<option value="${s.userId}">${s.name}</option>`).join('')}
        </select></td></tr>`).join('') : '<tr><td colspan="5" class="text-center">No tickets assigned</td></tr>';
}

async function reassign(ticketId, staffId) {
    if (!staffId) return;
    const r = await API.assignTicketById(ticketId, staffId);
    if (r.success) { alert('Ticket reassigned!'); loadStaff(); }
    else alert(r.message);
}
loadStaff();
</script>
<style>.panel-hidden{display:none!important}</style>
</body>
</html>
