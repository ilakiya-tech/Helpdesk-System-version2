<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/sidebar.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1F3373; --background-light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .main-content { flex: 1; padding: 1.5rem; }
        .panel-hidden { display: none !important; }
    </style>
</head>
<body>
<div class="d-flex layout-row layout-with-sidebar">
    <header id="sidebar-container"></header>
    <main class="main-content">
        <h2 class="mb-4 text-primary fw-bold">Staff Management</h2>
        <div class="card mb-4"><div class="card-body table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Availability</th>
                        <th>Assigned Tickets</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="staff-table">
                    <tr>
                        <td colspan="7" class="text-center py-4 text-muted">Loading staff...</td>
                    </tr>
                </tbody>
            </table>
        </div></div>
        
        <div class="card panel-hidden" id="staff-tickets-panel"><div class="card-body table-responsive">
            <h5 id="staff-tickets-title" class="fw-bold text-primary mb-3" style="font-size: 1rem;">Assigned Tickets</h5>
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Reassign</th>
                    </tr>
                </thead>
                <tbody id="staff-tickets-body"></tbody>
            </table>
        </div></div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireAuth(['admin'])) throw new Error('auth');
Sidebar.inject('admin', 'admin-staff.html');

let allStaff = [], allTickets = [];

async function loadStaff() {
    const tableBody = document.getElementById('staff-table');
    UI.skeleton(tableBody, 5, 7);
    const [sr, tr] = await Promise.all([API.getStaffList(), API.getTickets()]);
    allStaff = sr.staff || [];
    allTickets = tr.tickets || [];
    
    tableBody.innerHTML = allStaff.map(s => {
        const phone = s.phone || s.mobile || '-';
        return `<tr>
            <td><a href="#" class="fw-semibold text-decoration-none text-primary" onclick="showTickets('${s.userId}','${s.name}');return false;">${s.name}</a></td>
            <td>${s.email}</td>
            <td>${phone}</td>
            <td>${s.department || s.category || '-'}</td>
            <td>
                <select class="form-select form-select-sm" style="max-width:140px" onchange="setAvail('${s.userId}', this.value, this)">
                    <option value="available" ${s.availability==='available'?'selected':''}>Available</option>
                    <option value="on_leave" ${s.availability==='on_leave' || s.availability==='on leave'?'selected':''}>On Leave</option>
                    <option value="busy" ${s.availability==='busy'?'selected':''}>Busy</option>
                </select>
            </td>
            <td class="fw-semibold">${s.assignedCount || 0}</td>
            <td><button class="btn btn-sm btn-outline-primary" style="background:transparent !important; color:var(--primary-color) !important" onclick="showTickets('${s.userId}','${s.name}')">View Tickets</button></td>
        </tr>`;
    }).join('');
}

async function setAvail(id, val, selectEl) {
    if (selectEl) selectEl.disabled = true;
    await UI.blockDuplicate('avail-' + id, async () => {
        const r = await API.updateStaffAvailability(id, val);
        if (r.success) {
            UI.toast('success', 'Success', 'Availability updated');
            loadStaff();
        } else {
            UI.toast('error', 'Error', r.message || 'Failed to update availability');
            if (selectEl) selectEl.disabled = false;
        }
    });
}

function showTickets(staffId, name) {
    const staff = allStaff.find(s => s.userId === staffId);
    const tickets = allTickets.filter(t => t.assignedTo === name || t.assignedTo === staff?.username);
    document.getElementById('staff-tickets-title').textContent = `Tickets assigned to ${name}`;
    document.getElementById('staff-tickets-panel').classList.remove('panel-hidden');
    
    document.getElementById('staff-tickets-body').innerHTML = tickets.length ? tickets.map(t => `
        <tr>
            <td>#${t.id}</td>
            <td class="fw-semibold">${t.title}</td>
            <td>${UI.statusBadge(t.status)}</td>
            <td>${UI.priorityBadge(t.priority)}</td>
            <td>
                <select class="form-select form-select-sm reassign-dropdown" style="max-width:180px" onchange="reassign('${t._id || t.id}', this.value, this)">
                    <option value="">Reassign to...</option>
                    ${allStaff.filter(s => s.userId !== staffId).map(s => `<option value="${s.userId}">${s.name}</option>`).join('')}
                </select>
            </td>
        </tr>`).join('') : '<tr><td colspan="5" class="text-center py-3 text-muted">No tickets assigned</td></tr>';
}

async function reassign(ticketId, staffId, selectEl) {
    if (!staffId) return;
    if (selectEl) selectEl.disabled = true;
    
    await UI.blockDuplicate('reassign-' + ticketId, async () => {
        const r = await API.assignTicketById(ticketId, staffId);
        if (r.success) {
            UI.toast('success', 'Success', 'Ticket reassigned successfully');
            loadStaff();
            document.getElementById('staff-tickets-panel').classList.add('panel-hidden');
        } else {
            UI.toast('error', 'Error', r.message || 'Reassignment failed');
            if (selectEl) selectEl.disabled = false;
        }
    });
}

loadStaff();
</script>
</body>
</html>
