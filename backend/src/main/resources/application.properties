# ==========================================================
# Enterprise SLA Engine - application.properties
# ==========================================================

spring.application.name=enterprise-sla-engine

# ---- Server ----
server.port=8080

# ---- PostgreSQL datasource ----
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# 'validate' is used in production - schema must already exist in the database
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Use Spring Boot's database-platform (avoids HHH90000025 deprecation warning from hibernate.dialect)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ---- Application Secrets ----
# These MUST be set as environment variables - never hardcode in source
app.jwt.secret=${APP_JWT_SECRET}
app.org.secret=${APP_ORG_SECRET}

# ---- Logging ----
logging.level.com.workflow.engine=INFO
logging.level.org.hibernate.SQL=INFO

# ---- SLA Configuration (in minutes) ----
sla.rules.critical.response-minutes=30
sla.rules.critical.resolution-minutes=240
sla.rules.high.response-minutes=60
sla.rules.high.resolution-minutes=480
sla.rules.medium.response-minutes=240
sla.rules.medium.resolution-minutes=1440
sla.rules.low.response-minutes=480
sla.rules.low.resolution-minutes=4320

# ---- Mail Configuration ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ---- SQL Initialization ----
spring.sql.init.mode=always

