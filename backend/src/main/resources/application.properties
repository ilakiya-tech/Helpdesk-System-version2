# ==========================================================
# Enterprise SLA Engine - application.properties
# ==========================================================

spring.application.name=enterprise-sla-engine

# ---- Server ----
server.port=8080

# ---- PostgreSQL datasource ----
spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# validate|update|create|create-drop - use 'update' in dev, 'validate' in prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ---- Logging ----
logging.level.com.workflow.engine=INFO
logging.level.org.hibernate.SQL=DEBUG

# ---- SLA Configuration (in minutes) ----
sla.rules.critical.response-minutes=30
sla.rules.critical.resolution-minutes=240
sla.rules.high.response-minutes=60
sla.rules.high.resolution-minutes=480
sla.rules.medium.response-minutes=240
sla.rules.medium.resolution-minutes=1440
sla.rules.low.response-minutes=480
sla.rules.low.resolution-minutes=4320

